services:
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.amygold.shop
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "127.0.0.1:3010:3000"

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=4000
      - DATABASE_URL=file:/data/prod.db
      - UPLOADS_DIR=/data/uploads
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - server_data:/data
    ports:
      - "127.0.0.1:4000:4000"

volumes:
  server_data:

