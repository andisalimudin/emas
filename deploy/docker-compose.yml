services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
      - server

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.amygold.shop
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    expose:
      - "3000"

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=4000
      - DATABASE_URL=file:/data/prod.db
      - UPLOADS_DIR=/data/uploads
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - server_data:/data
    expose:
      - "4000"

volumes:
  caddy_data:
  caddy_config:
  server_data:

